<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with OpenAI Agent</title>
    <!-- Add Marked.js for markdown support -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --user-bubble: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --agent-bubble: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 1rem;
        }

        .chat-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 900px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            padding: 1.25rem 2rem;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--user-bubble);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        #chatbox {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: rgba(248, 250, 252, 0.5);
        }

        #chatbox::-webkit-scrollbar { width: 6px; }
        #chatbox::-webkit-scrollbar-track { background: transparent; }
        #chatbox::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; }
        .message.agent { align-self: flex-start; }

        .message-bubble {
            padding: 0.875rem 1.25rem;
            border-radius: 1.25rem;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .user .message-bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .agent .message-bubble {
            background: var(--agent-bubble);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Markdown Styling */
        .message-bubble pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 0.75rem 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
        }

        .message-bubble code {
            font-family: 'Fira Code', monospace;
            background: rgba(0, 0, 0, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
        }

        .user .message-bubble code { background: rgba(255, 255, 255, 0.2); }

        .message-bubble p:not(:last-child) { margin-bottom: 0.75rem; }
        .message-bubble ul, .message-bubble ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }

        .chat-input-container {
            padding: 1.5rem 2rem;
            background: white;
            border-top: 1px solid var(--border);
        }

        #chat-form {
            display: flex;
            gap: 1rem;
            position: relative;
        }

        #message {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border: 1.5px solid var(--border);
            border-radius: 1rem;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
        }

        #message:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button[type="submit"] {
            background: var(--user-bubble);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        /* Tool Approval UI */
        .tool-card {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid #e2e8f0;
        }

        .tool-header {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tool-list {
            list-style: none;
            margin: 0 !important;
        }

        .tool-item {
            background: white;
            padding: 0.75rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }

        .approval-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn-approve, .btn-deny {
            flex: 1;
            padding: 0.625rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-approve { background: #10b981; color: white; }
        .btn-deny { background: #ef4444; color: white; }
        .btn-approve:hover, .btn-deny:hover { opacity: 0.9; }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: white;
            border-radius: 1rem;
            width: fit-content;
            border: 1px solid var(--border);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .dots { display: flex; gap: 4px; }
        .dots span {
            width: 4px; height: 4px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dots span:nth-child(1) { animation-delay: -0.32s; }
        .dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 640px) {
            .chat-container { height: 95vh; border-radius: 16px; }
            .message { max-width: 95%; }
            .chat-header { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1><span class="status-dot"></span> AI Assistant</h1>
            <div style="font-size: 0.8rem; color: var(--text-muted)">Powered by GPT-4o</div>
        </header>
        
        <div id="chatbox">
            <!-- Messages will appear here -->
        </div>

        <div class="typing-indicator" id="typing-indicator" style="margin: 0 2rem 1rem;">
            <span>Agent is thinking</span>
            <div class="dots"><span></span><span></span><span></span></div>
        </div>
        
        <div class="chat-input-container">
            <form id="chat-form">
                <input type="text" id="message" autocomplete="off" placeholder="Message AI Assistant..." required />
                <button type="submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Send
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatbox = document.getElementById('chatbox');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message');
        const typingIndicator = document.getElementById('typing-indicator');
        
        let conversationHistory = [];

        // Configure marked.js
        marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function(code, lang) {
                return code; // In a real app, use Highlight.js here
            }
        });

        function appendMessage(sender, text, isPending = false, pendingTools = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            // Render Markdown for agent, plain text for user (security)
            if (sender === 'agent') {
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }
            
            if (isPending && pendingTools) {
                const toolCard = document.createElement('div');
                toolCard.className = 'tool-card';
                
                toolCard.innerHTML = `
                    <div class="tool-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                        Action Required
                    </div>
                    <div class="tool-list">
                        ${pendingTools.map(tool => `
                            <div class="tool-item">
                                <strong>${tool.name}</strong>(${JSON.stringify(tool.arguments)})
                            </div>
                        `).join('')}
                    </div>
                    <div class="approval-actions">
                        <button class="btn-approve" onclick="handleToolApproval('approved', ${JSON.stringify(pendingTools).replace(/"/g, '&quot;')}, this)">Approve All</button>
                        <button class="btn-deny" onclick="handleToolApproval('denied', ${JSON.stringify(pendingTools).replace(/"/g, '&quot;')}, this)">Deny</button>
                    </div>
                `;
                bubble.appendChild(toolCard);
            }
            
            messageDiv.appendChild(bubble);
            chatbox.appendChild(messageDiv);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        async function handleToolApproval(status, pendingTools, buttonEl) {
            const card = buttonEl.closest('.tool-card');
            card.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 0.5rem;">Tool request ${status}...</div>`;
            
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        status: status,
                        pending_tools: pendingTools,
                        history: conversationHistory
                    })
                });

                const data = await response.json();
                handleResponse(data);
            } catch (error) {
                hideTypingIndicator();
                appendMessage('agent', '❌ Error processing tool approval.');
                console.error('Approval failed', error);
            }
        }

        function showTypingIndicator() {
            typingIndicator.style.display = 'flex';
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }

        function handleResponse(data) {
            hideTypingIndicator();
            
            if (data.history) conversationHistory = data.history;
            
            if (data.status === 'pending') {
                appendMessage('agent', data.response || 'I need to perform some actions:', true, data.pending_tools);
            } else if (data.response) {
                appendMessage('agent', data.response);
            } else if (data.error || data.message) {
                appendMessage('agent', `⚠️ ${data.error || data.message}`);
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;
            
            appendMessage('user', message);
            messageInput.value = '';
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        history: conversationHistory
                    })
                });

                const data = await response.json();
                handleResponse(data);
            } catch (error) {
                hideTypingIndicator();
                appendMessage('agent', '❌ Connection error. Please try again.');
                console.error('Request failed', error);
            }
        });

        // Initial welcome message (optional)
        // appendMessage('agent', 'Hello! How can I help you today?');
        messageInput.focus();
    </script>
</body>
</html>
