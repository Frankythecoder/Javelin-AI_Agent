{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Javelin Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Add Marked.js for markdown support -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for LangGraph visualization -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="{% static 'chat/css/chat.css' %}">
</head>
<body>
    <img src="/logo.png" alt="" class="bg-logo" />
    <div class="chat-container">
        <header class="chat-header">
            <h1><span class="status-dot"></span> Javelin</h1>
            <div style="font-size: 0.8rem; color: var(--text-muted)">Powered by OpenAI</div>
            <div class="agent-controls">
                <button title="New Chat" onclick="newChat()">+</button>
                <button title="Chat History" onclick="toggleHistoryPanel()">🕐</button>
                <button title="Disable Tools" onclick="controlAgent('disable_tools')">🔒</button>
                <button title="Enable Tools" onclick="controlAgent('enable_tools')">🔓</button>
            </div>
            <!-- Chat History Panel (dropdown) -->
            <div id="history-panel" class="history-panel" style="display: none;">
                <div class="history-panel-header">
                    <span>Previous Chats</span>
                    <button onclick="toggleHistoryPanel()">✕</button>
                </div>
                <div id="history-list"></div>
            </div>
        </header>
        
        <div id="chatbox">
            <!-- Messages will appear here -->
        </div>

        <div class="typing-indicator" id="typing-indicator" style="margin: 0 2rem 1rem;">
            <span>Javelin is thinking</span>
            <div class="dots"><span></span><span></span><span></span></div>
        </div>
        
        <div class="chat-input-container">
            <div id="file-autocomplete" class="file-autocomplete" style="display:none;"></div>
            <form id="chat-form">
                <textarea id="message" autocomplete="off" placeholder="Message Javelin..." required rows="1"></textarea>
                <button type="button" id="mic-btn" class="btn-mic" onclick="toggleMic()" title="Start voice input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="1" width="6" height="12" rx="3"></rect><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="18" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button type="submit" id="send-stop-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Send
                </button>
            </form>
        </div>
    </div>

    <script src="{% static 'chat/js/chat.js' %}"></script>
</body>
</html>
